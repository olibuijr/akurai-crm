<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AkurAI-CRM</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="themes.css">
  <script>(function(){try{var t=localStorage.getItem("akurai-theme");if(!t)t=matchMedia("(prefers-color-scheme: light)").matches?"akurai-light":"akurai";document.documentElement.setAttribute("data-theme",t);}catch(e){}})()</script>
  <script type="module" src="theme.js"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card slide-up">
      <div class="login-brand">
        <div class="brand-icon"><svg viewBox="0 0 32 32" fill="currentColor" role="img" aria-label="AkurAI"><path fill-rule="evenodd" clip-rule="evenodd" d="M13.38 3.23c1.05-2.23 4.19-2.23 5.24 0l11.05 23.62A2.91 2.91 0 0 1 27.03 31h-3.42c-1.17 0-2.22-.7-2.67-1.78l-2.05-4.93h-5.78l-2.05 4.93A2.9 2.9 0 0 1 8.39 31H4.97a2.91 2.91 0 0 1-2.64-4.15L13.38 3.23ZM16 11.17l-5.13 13.1h10.26L16 11.17Z"/><path d="M10.38 20.54h11.24a2.23 2.23 0 0 1 0 4.46H10.38a2.23 2.23 0 0 1 0-4.46Z"/></svg></div>
        <h1>AkurAI-CRM</h1>
        <p>Sign in to your workspace</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <button class="btn btn-primary btn-lg" type="button" style="width:100%;justify-content:center;" id="signin-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;margin-right:8px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign in with AkurAI
      </button>

      <div class="login-footer">
        <a href="https://auth.olibuijr.com">Manage your account</a>
      </div>
    </div>
  </div>

  <script type="module">
    document.getElementById('signin-btn').addEventListener('click', () => {
      window.location.href = '/auth/login';
    });

    // Show error if redirected back with auth_error
    const params = new URLSearchParams(window.location.search);
    if (params.get('auth_error') === '1') {
      const el = document.getElementById('login-error');
      el.textContent = 'Authentication failed. Please try again.';
      el.style.display = 'block';
    }
    if (params.get('session_expired') === '1') {
      const el = document.getElementById('login-error');
      el.textContent = 'Your session has expired. Please sign in again.';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
